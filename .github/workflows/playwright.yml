name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  public-tests:
    name: Run Playwright public tests
    timeout-minutes: 10
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://forum.blackdesertm.com
      LOGIN_URL: https://forum.blackdesertm.com/Login?_returnUrl=https%3a%2f%2fforum.blackdesertm.com%2fBoard%3fboardNo%3d12
      BOARD_URL: https://forum.blackdesertm.com/Board?boardNo=12
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=public

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
